version: '3.8'

# All credentials below come from env vars with dev-only fallbacks.
# Copy .env.example to .env and override locally before `docker compose up`.
# In production (Render etc.) set MONGO_INITDB_ROOT_PASSWORD and JWT_SECRET
# in the platform's env-var UI; never ship the literal defaults below.

services:
  mongodb:
    image: mongo:latest
    container_name: financial-tracker-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-dev-only-change-me}
      MONGO_INITDB_DATABASE: financial-tracker
    volumes:
      - mongodb_data:/data/db
    networks:
      - financial-tracker-network

  backend:
    build: ./backend
    container_name: financial-tracker-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-dev-only-change-me}@mongodb:27017/financial-tracker?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-in-prod}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    networks:
      - financial-tracker-network

  frontend:
    build: ./frontend
    container_name: financial-tracker-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - financial-tracker-network

volumes:
  mongodb_data:
  uploads:

networks:
  financial-tracker-network:
    driver: bridge