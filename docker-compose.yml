version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: financial-tracker-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: financial-tracker
    volumes:
      - mongodb_data:/data/db
    networks:
      - financial-tracker-network

  backend:
    build: ./backend
    container_name: financial-tracker-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:adminpassword@mongodb:27017/financial-tracker?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    networks:
      - financial-tracker-network

  frontend:
    build: ./frontend
    container_name: financial-tracker-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - financial-tracker-network

volumes:
  mongodb_data:
  uploads:

networks:
  financial-tracker-network:
    driver: bridge